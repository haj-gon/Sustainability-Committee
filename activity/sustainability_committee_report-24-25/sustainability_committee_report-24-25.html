<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SBA Sustainability Committee Report 2024-25</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        @media print {
            .no-print { display: none !important; }
            .print-break { page-break-before: always; }
            body { background-color: white; }
            #root { margin: 0; padding: 0; }
            main { padding: 0 !important; overflow: visible !important; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- Icons ---
        const IconCheck = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="text-emerald-500"><polyline points="20 6 9 17 4 12"/></svg>;
        const IconX = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="text-red-400"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>;
        const IconLeaf = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10Z"/><path d="M2 21c0-3 1.85-5.36 5.08-6C9.5 14.52 12 13 13 12"/></svg>;
        const IconBuilding = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="16" height="20" x="4" y="2" rx="2" ry="2"/><path d="M9 22v-4h6v4"/><path d="M8 6h.01"/><path d="M16 6h.01"/><path d="M8 10h.01"/><path d="M16 10h.01"/><path d="M8 14h.01"/><path d="M16 14h.01"/><path d="M8 18h.01"/><path d="M16 18h.01"/></svg>;
        const IconChart = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 3v18h18"/><path d="m19 9-5 5-4-4-3 3"/></svg>;
        const IconTarget = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>;
        const IconBook = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>;
        const IconMenu = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="18" x2="20" y2="18"/></svg>;
        const IconBulb = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-1 1.5-2 1.5-3.5A6 6 0 0 0 6 8c0 1 .2 2.2 1.5 3.5.7.7 1.3 1.5 1.5 2.5"/><path d="M9 18h6"/><path d="M10 22h4"/></svg>;
        const IconSchool = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 6H5a2 2 0 0 0-2 2v3a2 2 0 0 0 2 2h13l4-3.5L18 6Z"/><path d="M12 13v9"/><path d="M12 2v4"/></svg>;
        const IconPrinter = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect width="12" height="8" x="6" y="14"/></svg>;
        const IconFile = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><line x1="10" y1="9" x2="8" y2="9"/></svg>;

        // --- Components ---

        const Overview = () => (
            <div className="space-y-8 fade-in">
                {/* Hero Header */}
                <div className="relative overflow-hidden rounded-2xl bg-gradient-to-r from-emerald-800 to-teal-600 text-white shadow-lg">
                    <div className="absolute top-0 right-0 -mr-16 -mt-16 w-64 h-64 rounded-full bg-white opacity-10 blur-3xl"></div>
                    <div className="absolute bottom-0 left-0 -ml-16 -mb-16 w-48 h-48 rounded-full bg-white opacity-10 blur-3xl"></div>
                    
                    <div className="relative p-8 md:p-10">
                        <div className="flex items-start justify-between">
                            <div>
                                <h2 className="text-3xl font-bold mb-3 tracking-tight">Executive Summary</h2>
                                <p className="text-emerald-100 text-lg max-w-2xl leading-relaxed">
                                    A comprehensive review of the 2024-25 Sustainability Committee's achievements, challenges, and strategic recommendations for the School of Business Administration.
                                </p>
                            </div>
                            <div className="hidden md:block opacity-80">
                                <IconLeaf className="w-16 h-16 text-emerald-200" />
                            </div>
                        </div>
                    </div>
                </div>

                {/* Status Cards */}
                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div className="group bg-white p-6 rounded-xl shadow-sm border border-slate-100 hover:shadow-md transition-shadow">
                        <div className="flex items-center gap-3 mb-5 border-b border-slate-50 pb-3">
                            <div className="p-2 bg-emerald-100 rounded-lg">
                                <IconCheck />
                            </div>
                            <h3 className="text-lg font-bold text-slate-800">Tasks Accomplished</h3>
                        </div>
                        <ul className="space-y-4">
                            {[
                                "Benchmarked peer/aspirant schools on sustainability curriculum.",
                                "Examine practices in Jepson & gathered faculty improvement ideas.",
                                "Presented on Laudato Si' Action Platform (Guest: Brian Henning)."
                            ].map((task, i) => (
                                <li key={i} className="flex items-start gap-3 text-sm text-slate-600">
                                    <span className="flex-shrink-0 w-1.5 h-1.5 mt-1.5 rounded-full bg-emerald-400"></span>
                                    <span>{task}</span>
                                </li>
                            ))}
                        </ul>
                    </div>

                    <div className="group bg-white p-6 rounded-xl shadow-sm border border-slate-100 hover:shadow-md transition-shadow">
                        <div className="flex items-center gap-3 mb-5 border-b border-slate-50 pb-3">
                            <div className="p-2 bg-red-100 rounded-lg">
                                <IconX />
                            </div>
                            <h3 className="text-lg font-bold text-slate-800">Pending Action</h3>
                        </div>
                        <div className="bg-red-50/50 rounded-lg p-4 border border-red-100">
                            <p className="font-semibold text-red-900 mb-1">Community Partnerships</p>
                            <p className="text-sm text-red-700 mb-3">
                                "Manage partnerships with Opportunity Northeast, Catholic Charities, etc."
                            </p>
                            <div className="flex items-center gap-2 text-xs text-red-600 bg-white/60 p-2 rounded">
                                <span className="font-bold">Status:</span>
                                <span>Guidance requested. Unclear tie to sustainability.</span>
                            </div>
                        </div>
                    </div>
                </div>

                {/* Committee Members */}
                <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                    <h3 className="text-sm font-semibold text-slate-500 uppercase tracking-wider mb-4">Committee Members 2024-25</h3>
                    <div className="flex flex-wrap gap-4">
                        {[
                            {name: 'Erica Johnson', role: 'Chair'},
                            {name: 'Gary Weber', role: 'Member'},
                            {name: 'Chrissy Bailey', role: 'Member'}
                        ].map((member, i) => (
                            <div key={i} className="flex items-center gap-3 px-4 py-3 bg-slate-50 rounded-lg border border-slate-100">
                                <div className="w-8 h-8 rounded-full bg-emerald-100 text-emerald-700 flex items-center justify-center font-bold text-xs">
                                    {member.name.split(' ').map(n=>n[0]).join('')}
                                </div>
                                <div>
                                    <p className="text-sm font-semibold text-slate-700">{member.name}</p>
                                    <p className="text-xs text-slate-500">{member.role}</p>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            </div>
        );

        const Benchmarking = ({ viewAll }) => {
            const [activeTab, setActiveTab] = useState('institutional');

            const data = {
                institutional: {
                    title: "Institutional",
                    icon: IconBuilding,
                    items: [
                        { school: "Santa Clara University", desc: "Inter-disciplinary Sustainable Business Institute (2023)" },
                        { school: "Loyola Marymount", desc: "Institute for Business Ethics and Sustainability" },
                        { school: "Regis University", desc: "SEED Institute (Sustainable Economic and Enterprise Development)" },
                        { school: "Gonzaga University", desc: "Institute for Climate, Water, and the Environment" },
                        { school: "Arizona State", desc: "School of Sustainability; requires sustainability course for all students" }
                    ]
                },
                majors: {
                    title: "Majors",
                    icon: IconSchool,
                    items: [
                        { school: "Western Washington", desc: "BA in Business and Sustainability" },
                        { school: "Xavier University", desc: "Sustainability: Economics & Management BSBA" },
                        { school: "Loyola Maryland", desc: "BBA in Sustainability Management" },
                        { school: "Seattle Pacific", desc: "International Sustainable Development Major" },
                        { school: "Saint Joseph's", desc: "Major in Leadership, Ethics and Org Sustainability" }
                    ]
                },
                minors: {
                    title: "Minors",
                    icon: IconBook,
                    items: [
                        { school: "Gonzaga University", desc: "Sustainable Business Minor" },
                        { school: "Fordham University", desc: "Sustainable Business Minor" },
                        { school: "NYU", desc: "Concentration in Sustainable Business" },
                        { school: "Boise State", desc: "Sustainability Minor" },
                        { school: "University of Portland", desc: "Sustainability Minor" }
                    ]
                },
                grad: {
                    title: "Graduate",
                    icon: IconTarget,
                    items: [
                        { school: "Univ. of San Francisco", desc: "MS in Management for Sustainable Business Solutions" },
                        { school: "Georgetown", desc: "MS in Environmental and Sustainability Management" },
                        { school: "Loyola Marymount", desc: "MS in Entrepreneurship and Sustainable Innovation" }
                    ]
                }
            };

            const ActiveIcon = data[activeTab].icon;

            const renderCategory = (key, value) => (
                <div key={key} className={viewAll ? "mb-8 break-inside-avoid" : ""}>
                    {viewAll && <h3 className="text-lg font-bold text-slate-800 mb-3 flex items-center gap-2 border-b pb-2"><value.icon />{value.title}</h3>}
                    <div className="grid gap-4 animate-in slide-in-from-bottom-2 duration-300">
                        {value.items.map((item, idx) => (
                            <div key={idx} className="bg-white p-5 rounded-xl shadow-sm border border-slate-100 hover:border-emerald-300 transition-all flex items-start gap-4">
                                <div className="mt-1 p-2 bg-slate-50 rounded-lg text-slate-400">
                                    <value.icon />
                                </div>
                                <div>
                                    <h4 className="font-bold text-slate-800 text-lg">{item.school}</h4>
                                    <p className="text-slate-600 text-sm mt-1 leading-relaxed">{item.desc}</p>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );

            return (
                <div className="space-y-6 fade-in">
                    {!viewAll && (
                        <div className="flex justify-between items-end border-b border-slate-200 pb-4">
                            <div>
                                <h2 className="text-2xl font-bold text-slate-800">Benchmarking Report</h2>
                                <p className="text-slate-500 text-sm mt-1">Comparisons with Peer & Aspirant Schools</p>
                            </div>
                        </div>
                    )}
                    
                    {viewAll && (
                         <div className="mb-6">
                            <h2 className="text-2xl font-bold text-slate-800">Benchmarking Data</h2>
                            <p className="text-slate-500 text-sm mt-1">Full breakdown of peer institution programs</p>
                        </div>
                    )}

                    {/* Tabs - Only show if not in viewAll mode */}
                    {!viewAll && (
                        <div className="flex gap-2 overflow-x-auto pb-2 no-scrollbar">
                            {Object.entries(data).map(([key, value]) => {
                                const TabIcon = value.icon;
                                return (
                                    <button
                                        key={key}
                                        onClick={() => setActiveTab(key)}
                                        className={`flex items-center gap-2 px-5 py-2.5 rounded-full text-sm font-medium transition-all whitespace-nowrap ${
                                            activeTab === key 
                                                ? 'bg-emerald-600 text-white shadow-md shadow-emerald-200 transform scale-105' 
                                                : 'bg-white text-slate-600 border border-slate-200 hover:bg-slate-50 hover:border-emerald-200'
                                        }`}
                                    >
                                        <TabIcon />
                                        {value.title}
                                    </button>
                                );
                            })}
                        </div>
                    )}

                    {/* Content Grid */}
                    {viewAll ? (
                        <div className="grid gap-8">
                            {Object.entries(data).map(([key, value]) => renderCategory(key, value))}
                        </div>
                    ) : (
                        renderCategory(activeTab, data[activeTab])
                    )}
                    
                    <div className="mt-8 p-5 bg-gradient-to-r from-blue-50 to-indigo-50 rounded-xl border border-blue-100 flex gap-4 break-inside-avoid">
                         <div className="p-2 bg-blue-100 text-blue-600 rounded-lg h-fit">
                             <IconChart />
                         </div>
                         <div>
                            <h4 className="font-bold text-blue-900 mb-1">Job Market Insight</h4>
                            <p className="text-sm text-blue-800 leading-relaxed">
                                Companies like <strong>Black Rock</strong> and <strong>First Street</strong> are actively hiring for Sustainability Analytics and Climate Risk roles. Prioritizing the triple bottom line directly enhances student employability.
                            </p>
                         </div>
                    </div>
                </div>
            );
        };

        const BuildingPractices = ({ viewAll }) => {
            const [filter, setFilter] = useState('All');

            const ideas = [
                { title: "Smart Meters", desc: "Install meters to track energy consumption and analyze improvement areas.", tag: "Energy" },
                { title: "Destratification Fans", desc: "Ceiling fans to move warm air down, reducing heating energy needs.", tag: "Energy" },
                { title: "Motion Sensors", desc: "Motion sensor lights in offices and restrooms to reduce unnecessary consumption.", tag: "Energy" },
                { title: "Electronics Repair", desc: "Student-run shop to repair/reuse electronics. Reduces e-waste and offers hands-on learning.", tag: "Waste" },
                { title: "Sustainable Food", desc: "Vegetarian options at socials; avoid plasticware; use the dishwasher.", tag: "Waste" },
                { title: "Restroom Hand Dryers", desc: "Convert paper towels to electric hand dryers to save trees and budget.", tag: "Waste" },
                { title: "Prof. Attire Rental", desc: "Rental/exchange store for business clothing. Reduces textile waste and helps students.", tag: "Social" },
                { title: "Transportation", desc: "Bus/Bike challenges; Faculty 'Happy Hour' bus ride event.", tag: "Transport" },
                { title: "Digital Transition", desc: "Remarkable tablets for faculty; Online exams to reduce paper.", tag: "Tech" }
            ];

            const categories = ['All', 'Energy', 'Waste', 'Social', 'Transport', 'Tech'];
            
            const filteredIdeas = (viewAll || filter === 'All') ? ideas : ideas.filter(i => i.tag === filter);

            return (
                <div className="space-y-6 fade-in">
                     <div className="flex flex-col md:flex-row justify-between items-start md:items-end gap-4">
                        <div>
                            <h2 className="text-2xl font-bold text-slate-800">Jepson Building Improvements</h2>
                            <p className="text-slate-500 mt-1 text-sm">Actionable ideas collected from faculty & staff.</p>
                        </div>
                        {/* Hide filters in View All mode */}
                        {!viewAll && (
                            <div className="flex flex-wrap gap-2">
                                {categories.map(cat => (
                                    <button
                                        key={cat}
                                        onClick={() => setFilter(cat)}
                                        className={`px-3 py-1 text-xs font-semibold rounded-full transition-colors ${
                                            filter === cat 
                                                ? 'bg-slate-800 text-white' 
                                                : 'bg-white text-slate-500 border border-slate-200 hover:bg-slate-50'
                                        }`}
                                    >
                                        {cat}
                                    </button>
                                ))}
                            </div>
                        )}
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                        {filteredIdeas.map((idea, i) => (
                            <div key={i} className="group bg-white p-5 rounded-xl shadow-sm border border-slate-200 hover:shadow-lg hover:-translate-y-1 transition-all duration-300 break-inside-avoid">
                                <div className="flex justify-between items-start mb-3">
                                    <div className="p-2 bg-slate-50 rounded-lg text-slate-400 group-hover:text-emerald-500 transition-colors">
                                        <IconBulb />
                                    </div>
                                    <span className="text-[10px] font-bold uppercase tracking-wider px-2 py-1 bg-slate-100 text-slate-500 rounded-md">
                                        {idea.tag}
                                    </span>
                                </div>
                                <h3 className="font-bold text-slate-800 mb-2">{idea.title}</h3>
                                <p className="text-sm text-slate-600 leading-relaxed">{idea.desc}</p>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const CurriculumSurvey = () => {
            const totalRespondents = 17;
            const teachingSustainability = 13;
            const percentTeaching = Math.round((teachingSustainability / totalRespondents) * 100);
            
            return (
                <div className="space-y-8 fade-in">
                    <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 break-inside-avoid">
                        <div className="flex flex-col md:flex-row gap-8 items-center">
                            <div className="relative w-40 h-40 flex-shrink-0">
                                <svg className="w-full h-full transform -rotate-90" viewBox="0 0 36 36">
                                    <path className="text-slate-100" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" fill="none" stroke="currentColor" strokeWidth="3" />
                                    <path className="text-emerald-500 drop-shadow-md" strokeDasharray={`${percentTeaching}, 100`} d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" />
                                </svg>
                                <div className="absolute inset-0 flex flex-col items-center justify-center">
                                    <span className="text-3xl font-bold text-slate-800">{percentTeaching}%</span>
                                    <span className="text-xs text-slate-500 uppercase font-semibold">Engaged</span>
                                </div>
                            </div>
                            <div>
                                <h2 className="text-2xl font-bold text-slate-800 mb-2">Faculty Engagement</h2>
                                <p className="text-slate-600 mb-4 leading-relaxed">
                                    Out of 17 respondents, <strong className="text-emerald-600">{teachingSustainability}</strong> already incorporate sustainability into their coursework. Topics include Corporate Responsibility, SDGs, and the Triple Bottom Line.
                                </p>
                            </div>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                        <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 break-inside-avoid">
                            <h3 className="text-lg font-bold text-slate-800 mb-6">Support for New Requirement?</h3>
                            
                            <div className="space-y-5">
                                <div>
                                    <div className="flex justify-between text-sm mb-1">
                                        <span className="font-semibold text-slate-700">No (Do not require)</span>
                                        <span className="font-bold text-slate-900">59%</span>
                                    </div>
                                    <div className="w-full bg-slate-100 rounded-full h-3 overflow-hidden">
                                        <div className="bg-red-400 h-full rounded-full" style={{ width: '59%' }}></div>
                                    </div>
                                </div>
                                <div>
                                    <div className="flex justify-between text-sm mb-1">
                                        <span className="font-semibold text-slate-700">Yes / Maybe</span>
                                        <span className="font-bold text-slate-900">41%</span>
                                    </div>
                                    <div className="w-full bg-slate-100 rounded-full h-3 overflow-hidden">
                                        <div className="bg-emerald-400 h-full rounded-full" style={{ width: '41%' }}></div>
                                    </div>
                                </div>
                            </div>
                            <p className="mt-6 text-sm text-slate-500 italic">
                                *Faculty are hesitant to add credit requirements for majors.
                            </p>
                        </div>

                        <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 flex flex-col justify-center break-inside-avoid">
                            <h3 className="text-lg font-bold text-slate-800 mb-4">Top Recommendations</h3>
                            <div className="space-y-4">
                                <div className="flex gap-4 items-start p-3 bg-emerald-50 rounded-lg border border-emerald-100">
                                    <div className="p-1 bg-white rounded text-emerald-600 shadow-sm"><IconCheck /></div>
                                    <div>
                                        <h4 className="font-bold text-emerald-900 text-sm">Integrate into Business Ethics</h4>
                                        <p className="text-xs text-emerald-800 mt-1">Ensure sustainability is a core component of the existing Ethics course.</p>
                                    </div>
                                </div>
                                <div className="flex gap-4 items-start p-3 bg-slate-50 rounded-lg border border-slate-100">
                                    <div className="p-1 bg-white rounded text-slate-500 shadow-sm"><IconBook /></div>
                                    <div>
                                        <h4 className="font-bold text-slate-800 text-sm">Discipline-Specific Modules</h4>
                                        <p className="text-xs text-slate-600 mt-1">1-credit offerings (e.g., Green Marketing, Supply Chain).</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const FutureIdeas = () => (
            <div className="space-y-8 fade-in">
                 <div className="bg-gradient-to-r from-blue-600 to-indigo-700 p-8 rounded-2xl shadow-lg text-white break-inside-avoid">
                    <h2 className="text-2xl font-bold mb-2">The Path Forward</h2>
                    <p className="text-blue-100 max-w-2xl">
                        Strategic roadmap for the 2025-26 Academic Year based on committee findings.
                    </p>
                </div>

                <div className="relative pl-8 border-l-2 border-slate-200 space-y-12 my-8">
                    {[
                        { 
                            title: "Curriculum Refinement", 
                            desc: "Review sustainability curriculum and recommend improvements, such as integrating new case studies or datasets into existing classes rather than creating new requirements.", 
                            icon: IconBook 
                        },
                        { 
                            title: "Practice Implementation", 
                            desc: "Execute on Jepson improvements: Calculate the building's carbon footprint and collaborate with Plant Services to implement the highest impact ideas.", 
                            icon: IconBuilding 
                        },
                        { 
                            title: "Strategic Clarity", 
                            desc: "Request clear guidance on the 'Community Partnerships' task. If it cannot be clearly tied to sustainability goals, recommend its removal for next year.", 
                            icon: IconTarget 
                        }
                    ].map((item, i) => (
                        <div key={i} className="relative group break-inside-avoid">
                            <div className="absolute -left-[41px] top-0 w-6 h-6 rounded-full bg-slate-100 border-4 border-white shadow-sm flex items-center justify-center group-hover:bg-emerald-500 group-hover:scale-125 transition-all duration-300">
                                <div className="w-1.5 h-1.5 bg-slate-400 rounded-full group-hover:bg-white"></div>
                            </div>
                            <div className="bg-white p-6 rounded-xl border border-slate-200 shadow-sm hover:shadow-md transition-shadow">
                                <h3 className="text-lg font-bold text-slate-800 flex items-center gap-2">
                                    {item.title}
                                </h3>
                                <p className="text-slate-600 mt-2 leading-relaxed">{item.desc}</p>
                            </div>
                        </div>
                    ))}
                </div>
            </div>
        );

        // --- Main App ---

        const App = () => {
            const [activeSection, setActiveSection] = useState('overview');
            const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);

            const navItems = [
                { id: 'overview', label: 'Overview', icon: IconTarget },
                { id: 'benchmarking', label: 'Benchmarking', icon: IconChart },
                { id: 'building', label: 'Building Practices', icon: IconBuilding },
                { id: 'survey', label: 'Curriculum Survey', icon: IconBook },
                { id: 'future', label: 'Roadmap', icon: IconLeaf },
            ];

            const renderContent = () => {
                switch(activeSection) {
                    case 'overview': return <Overview />;
                    case 'benchmarking': return <Benchmarking />;
                    case 'building': return <BuildingPractices />;
                    case 'survey': return <CurriculumSurvey />;
                    case 'future': return <FutureIdeas />;
                    case 'full': return (
                        <div className="space-y-12">
                            <section className="print-break"><Overview /></section>
                            <section className="print-break"><Benchmarking viewAll={true} /></section>
                            <section className="print-break"><BuildingPractices viewAll={true} /></section>
                            <section className="print-break"><CurriculumSurvey /></section>
                            <section className="print-break"><FutureIdeas /></section>
                        </div>
                    );
                    default: return <Overview />;
                }
            };

            return (
                <div className="min-h-screen bg-slate-50 flex flex-col md:flex-row max-w-7xl mx-auto md:shadow-2xl md:my-8 md:rounded-3xl overflow-hidden border border-slate-200">
                    
                    {/* Mobile Header */}
                    <div className="md:hidden bg-white border-b border-slate-200 p-4 flex justify-between items-center sticky top-0 z-20 no-print">
                        <div className="flex items-center gap-2 text-emerald-700 font-bold">
                            <IconLeaf className="w-6 h-6"/>
                            <span>SBA Report</span>
                        </div>
                        <button onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)} className="text-slate-600 p-2">
                            <IconMenu />
                        </button>
                    </div>

                    {/* Sidebar Navigation */}
                    <div className={`
                        fixed inset-0 z-10 bg-white md:static md:w-72 md:bg-white md:border-r border-slate-200 p-6 flex-shrink-0 transition-transform duration-300 transform no-print
                        ${isMobileMenuOpen ? 'translate-x-0' : '-translate-x-full md:translate-x-0'}
                    `}>
                        <div className="hidden md:flex items-center gap-3 mb-10 text-emerald-700 pl-2">
                            <div className="p-2 bg-emerald-100 rounded-lg">
                                <IconLeaf className="w-6 h-6" />
                            </div>
                            <div>
                                <h1 className="text-lg font-bold tracking-tight leading-none">Sustainability</h1>
                                <p className="text-xs text-emerald-600 uppercase tracking-wider font-semibold mt-1">2024-25 Report</p>
                            </div>
                        </div>
                        
                        <nav className="space-y-2">
                            {navItems.map((item) => (
                                <button
                                    key={item.id}
                                    onClick={() => {
                                        setActiveSection(item.id);
                                        setIsMobileMenuOpen(false);
                                    }}
                                    className={`flex items-center gap-3 px-4 py-3.5 rounded-xl text-sm font-medium w-full transition-all ${
                                        activeSection === item.id 
                                            ? 'bg-emerald-50 text-emerald-800 shadow-sm ring-1 ring-emerald-100' 
                                            : 'text-slate-500 hover:bg-slate-50 hover:text-slate-900'
                                    }`}
                                >
                                    <item.icon />
                                    {item.label}
                                </button>
                            ))}
                            
                            <hr className="border-slate-100 my-4" />
                            
                            <button
                                onClick={() => {
                                    setActiveSection('full');
                                    setIsMobileMenuOpen(false);
                                }}
                                className={`flex items-center gap-3 px-4 py-3.5 rounded-xl text-sm font-medium w-full transition-all ${
                                    activeSection === 'full' 
                                        ? 'bg-slate-800 text-white shadow-sm' 
                                        : 'text-slate-600 bg-slate-50 hover:bg-slate-100 hover:text-slate-900'
                                }`}
                            >
                                <IconFile />
                                Full Report
                            </button>
                            
                             <button
                                onClick={() => {
                                    if(activeSection !== 'full') setActiveSection('full');
                                    setTimeout(() => window.print(), 300);
                                }}
                                className="flex items-center gap-3 px-4 py-3.5 rounded-xl text-sm font-medium w-full transition-all text-slate-500 hover:text-emerald-700 hover:bg-emerald-50"
                            >
                                <IconPrinter />
                                Print / Save PDF
                            </button>
                        </nav>

                        <div className="absolute bottom-6 left-6 right-6 hidden md:block">
                            <div className="p-4 bg-slate-50 rounded-xl border border-slate-100 text-xs text-slate-500">
                                <p className="font-semibold text-slate-700 mb-1">Generated Report</p>
                                <p>SBA Sustainability Committee</p>
                            </div>
                        </div>
                    </div>

                    {/* Main Content Area */}
                    <main className="flex-1 p-6 md:p-10 lg:p-12 overflow-y-auto bg-slate-50/30">
                        {renderContent()}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
