<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sustainability Committee Meeting Memo - Dec 4, 2025</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        @media print {
            .no-print { display: none !important; }
            body { background-color: white; }
            .print-break { page-break-before: always; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // --- Icons ---
        const IconUsers = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>;
        const IconBuilding = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="16" height="20" x="4" y="2" rx="2" ry="2"/><path d="M9 22v-4h6v4"/><path d="M8 6h.01"/><path d="M16 6h.01"/><path d="M8 10h.01"/><path d="M16 10h.01"/><path d="M8 14h.01"/><path d="M16 14h.01"/><path d="M8 18h.01"/><path d="M16 18h.01"/></svg>;
        const IconFood = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 5.38A2.62 2.62 0 1 0 12 1.25a2.62 2.62 0 0 0 0 4.13Z"/><path d="M10 22v-6a2 2 0 1 1 4 0v6"/><path d="m14 11 1.76-6.42a1 1 0 0 0-1.87-.69L12 10.5l-1.89-6.6a1 1 0 0 0-1.87.69L10 11"/></svg>;
        const IconNews = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 22h16a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2H8a2 2 0 0 0-2 2v16a2 2 0 0 1-2 2Zm0 0a2 2 0 0 1-2-2v-9c0-1.1.9-2 2-2h2"/><path d="M18 14h-8"/><path d="M15 18h-5"/><path d="M10 6h8v4h-8V6Z"/></svg>;
        const IconUni = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>;
        const IconFootprint = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 16v-2.38C4 11.5 2.97 10.5 3 8c.03-2.72 1.49-6 4.5-6C9.37 2 11 3.8 11 8c0 3.95-2.05 6-2.05 8H4Z"/><path d="M9 16v-2.38C9 11.5 7.97 10.5 8 8c.03-2.72 1.49-6 4.5-6C14.37 2 16 3.8 16 8c0 3.95-2.05 6-2.05 8H9Z"/><path d="M20.2 15.6c.6 1.1.8 1.9.8 2.4 0 2.2-1.8 4-4 4-1.7 0-3.2-1.1-3.8-2.6"/></svg>;
        const IconFolder = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 20a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.9a2 2 0 0 1-1.69-.9L9.6 3.9A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13a2 2 0 0 0 2 2Z"/></svg>;
        const IconUserPlus = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg>;
        const IconMenu = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="18" x2="20" y2="18"/></svg>;
        const IconLeaf = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10Z"/><path d="M2 21c0-3 1.85-5.36 5.08-6C9.5 14.52 12 13 13 12"/></svg>;

        // --- Sections ---

        const Overview = () => (
            <div className="space-y-6 fade-in">
                <div className="bg-gradient-to-br from-indigo-900 to-slate-800 text-white p-8 rounded-2xl shadow-lg relative overflow-hidden">
                    <div className="relative z-10">
                        <div className="flex items-center gap-3 mb-2 text-indigo-200 uppercase tracking-wider text-sm font-semibold">
                            Meeting Memo
                        </div>
                        <h1 className="text-3xl md:text-4xl font-bold mb-4">Sustainability Committee</h1>
                        <div className="flex flex-col md:flex-row gap-6 mt-6 pt-6 border-t border-white/20">
                            <div>
                                <span className="text-indigo-300 text-xs uppercase font-bold block mb-1">Date</span>
                                <span className="font-medium">Thursday, December 4, 2025</span>
                            </div>
                            <div>
                                <span className="text-indigo-300 text-xs uppercase font-bold block mb-1">Members Present</span>
                                <span className="font-medium">Joo, Erica, Jacob</span>
                            </div>
                        </div>
                    </div>
                    <IconLeaf className="absolute -bottom-8 -right-8 w-64 h-64 text-white opacity-5 rotate-12" />
                </div>
                
                <div className="bg-white p-6 rounded-xl border border-slate-200 shadow-sm">
                    <h2 className="text-lg font-bold text-slate-800 mb-4">Quick Summary</h2>
                    <p className="text-slate-600 leading-relaxed mb-4">
                        The committee convened to discuss operational improvements in Jepson (batteries, signage), sustainable food practices for events, and communication strategies including a new monthly newsletter. 
                        Updates on university-wide curriculum attributes and carbon footprint data collection were also shared.
                    </p>
                    <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mt-6">
                        <div className="p-3 bg-slate-50 rounded-lg text-center">
                            <span className="block text-2xl font-bold text-indigo-600">3</span>
                            <span className="text-xs text-slate-500 font-medium uppercase">Ops Items</span>
                        </div>
                        <div className="p-3 bg-slate-50 rounded-lg text-center">
                            <span className="block text-2xl font-bold text-emerald-600">New</span>
                            <span className="text-xs text-slate-500 font-medium uppercase">Newsletter</span>
                        </div>
                         <div className="p-3 bg-slate-50 rounded-lg text-center">
                            <span className="block text-2xl font-bold text-blue-600">C-S-EJ</span>
                            <span className="text-xs text-slate-500 font-medium uppercase">Curriculum</span>
                        </div>
                        <div className="p-3 bg-slate-50 rounded-lg text-center">
                            <span className="block text-2xl font-bold text-amber-600">Data</span>
                            <span className="text-xs text-slate-500 font-medium uppercase">Footprint</span>
                        </div>
                    </div>
                </div>
            </div>
        );

        const BuildingOps = () => (
            <div className="space-y-6 fade-in">
                <div className="flex items-center gap-3 mb-2">
                    <div className="p-2 bg-indigo-100 rounded-lg text-indigo-700"><IconBuilding /></div>
                    <h2 className="text-2xl font-bold text-slate-800">1. Building & Operations</h2>
                </div>
                
                <div className="grid md:grid-cols-2 gap-6">
                    <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                        <h3 className="font-bold text-slate-800 text-lg mb-3">Battery Recycling Box</h3>
                        <p className="text-slate-600 mb-4">
                            Plan to establish a designated battery collection container in Jepson to encourage proper disposal of e-waste.
                        </p>
                        <div className="inline-flex items-center gap-2 px-3 py-1 bg-green-50 text-green-700 text-sm font-medium rounded-full">
                            Action: Locate & Install
                        </div>
                    </div>

                    <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                        <h3 className="font-bold text-slate-800 text-lg mb-3">Bathroom Signage</h3>
                        <p className="text-slate-600 mb-4">
                            Add consistent signage to all Jepson restrooms to clarify waste streams.
                        </p>
                        <div className="p-3 bg-slate-50 border-l-4 border-indigo-400 italic text-slate-700">
                            "Paper towels go in compost."
                        </div>
                    </div>
                </div>
            </div>
        );

        const FoodPractices = () => (
            <div className="space-y-6 fade-in">
                <div className="flex items-center gap-3 mb-2">
                    <div className="p-2 bg-emerald-100 rounded-lg text-emerald-700"><IconFood /></div>
                    <h2 className="text-2xl font-bold text-slate-800">2. Sustainable Food Practices</h2>
                </div>

                <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                    <h3 className="font-bold text-slate-800 mb-4">SODEXO Catering Requests</h3>
                    <ul className="space-y-3">
                        <li className="flex items-start gap-3">
                            <span className="mt-1 w-2 h-2 rounded-full bg-emerald-500"></span>
                            <span className="text-slate-700">Request <strong>sustainably sourced ingredients</strong> whenever possible.</span>
                        </li>
                        <li className="flex items-start gap-3">
                            <span className="mt-1 w-2 h-2 rounded-full bg-emerald-500"></span>
                            <span className="text-slate-700">Prioritize <strong>plant-forward / vegetarian options</strong> for Jepson events.</span>
                        </li>
                    </ul>
                </div>

                <div className="bg-emerald-50 p-6 rounded-xl border border-emerald-100">
                    <h3 className="font-bold text-emerald-900 mb-2">Vendor List Initiative</h3>
                    <p className="text-emerald-800">
                        Compile a list of sustainable or locally sourced food vendors for internal SBA use when planning events.
                    </p>
                </div>
            </div>
        );

        const Communication = () => (
            <div className="space-y-6 fade-in">
                <div className="flex items-center gap-3 mb-2">
                    <div className="p-2 bg-blue-100 rounded-lg text-blue-700"><IconNews /></div>
                    <h2 className="text-2xl font-bold text-slate-800">3. Communication & Engagement</h2>
                </div>

                <div className="bg-white p-8 rounded-xl shadow-lg border border-slate-100 relative overflow-hidden">
                    <div className="absolute top-0 right-0 w-32 h-32 bg-blue-50 rounded-bl-full -mr-8 -mt-8"></div>
                    
                    <h3 className="text-xl font-bold text-slate-800 mb-2 relative z-10">New Initiative: Monthly Newsletter</h3>
                    <p className="text-slate-500 mb-6 relative z-10">Target Audience: SBA faculty, staff, and students.</p>

                    <div className="grid md:grid-cols-3 gap-6 relative z-10">
                        <div>
                            <h4 className="font-semibold text-blue-700 mb-2">Purpose</h4>
                            <ul className="text-sm text-slate-600 space-y-2">
                                <li>• Highlight Jepson practices</li>
                                <li>• Share University updates</li>
                                <li>• Promote engagement</li>
                            </ul>
                        </div>
                        <div>
                            <h4 className="font-semibold text-blue-700 mb-2">Launch Goal</h4>
                            <p className="text-sm text-slate-600">
                                Release the first issue at the <strong>beginning of next semester</strong> for high visibility.
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        );

        const UniversityUpdates = () => (
            <div className="space-y-6 fade-in">
                <div className="flex items-center gap-3 mb-2">
                    <div className="p-2 bg-purple-100 rounded-lg text-purple-700"><IconUni /></div>
                    <h2 className="text-2xl font-bold text-slate-800">4. University-Level Updates</h2>
                </div>
                <p className="text-slate-500 text-sm italic">Provided by Erica Johnson from the University Sustainability Committee.</p>

                <div className="space-y-4">
                    <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                        <div className="flex justify-between items-start">
                            <h3 className="font-bold text-slate-800 text-lg">C-S-EJ Course Attribute</h3>
                            <span className="px-2 py-1 bg-purple-100 text-purple-700 text-xs font-bold rounded uppercase">Curriculum</span>
                        </div>
                        <p className="text-slate-600 mt-2 mb-4">
                            New attribute for classes engaging with Climate, Sustainability, or Environmental/Social Justice.
                        </p>
                        <div className="bg-slate-50 p-4 rounded-lg">
                            <h4 className="font-semibold text-slate-700 text-sm mb-2">Strategic Alignment:</h4>
                            <div className="flex flex-wrap gap-2">
                                <span className="px-2 py-1 bg-white border border-slate-200 rounded text-xs text-slate-600">STARS Reporting</span>
                                <span className="px-2 py-1 bg-white border border-slate-200 rounded text-xs text-slate-600">Laudato Si’ Action Platform</span>
                                <span className="px-2 py-1 bg-white border border-slate-200 rounded text-xs text-slate-600">Ecological Awareness Goal</span>
                            </div>
                        </div>
                        <div className="mt-4 pt-4 border-t border-slate-100">
                            <h4 className="font-semibold text-slate-700 text-sm mb-1">Faculty Action:</h4>
                            <ul className="text-sm text-slate-600 list-disc ml-5">
                                <li>Click "Add New C-S-EJ Course" if qualified.</li>
                                <li>Submit one form per course.</li>
                                <li>Questions? <a href="mailto:ClimateInstitute@gonzaga.edu" className="text-purple-600 hover:underline">ClimateInstitute@gonzaga.edu</a></li>
                            </ul>
                        </div>
                    </div>

                    <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                         <h3 className="font-bold text-slate-800 text-lg">Sustainability Literacy Survey</h3>
                         <p className="text-slate-600 mt-2">
                            The University is developing a survey to gauge student knowledge.
                         </p>
                    </div>
                </div>
            </div>
        );

        const CarbonFootprint = () => (
            <div className="space-y-6 fade-in">
                <div className="flex items-center gap-3 mb-2">
                    <div className="p-2 bg-amber-100 rounded-lg text-amber-700"><IconFootprint /></div>
                    <h2 className="text-2xl font-bold text-slate-800">5. Carbon Footprint Data</h2>
                </div>

                <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                    <p className="text-slate-600 mb-6">
                        The committee aims to gather baseline carbon-footprint data from Jepson faculty, staff, and students. 
                        This will inform long-term planning.
                    </p>

                    <div className="grid md:grid-cols-2 gap-4 mb-6">
                        <a href="https://www.epa.gov/ghgemissions/carbon-footprint-calculator" target="_blank" className="block p-4 rounded-lg border border-slate-200 hover:border-amber-400 hover:bg-amber-50 transition-colors group">
                            <h4 className="font-bold text-slate-800 group-hover:text-amber-800">EPA Calculator ↗</h4>
                            <p className="text-xs text-slate-500 mt-1">www.epa.gov</p>
                        </a>
                        <a href="https://regeneration.org/carbon" target="_blank" className="block p-4 rounded-lg border border-slate-200 hover:border-amber-400 hover:bg-amber-50 transition-colors group">
                            <h4 className="font-bold text-slate-800 group-hover:text-amber-800">Regeneration Calculator ↗</h4>
                            <p className="text-xs text-slate-500 mt-1">regeneration.org</p>
                        </a>
                    </div>

                    <div className="bg-amber-50 p-4 rounded-lg text-sm text-amber-800 flex items-start gap-3">
                        <span className="font-bold text-lg">!</span>
                        <p>
                            <strong>Plan:</strong> Create a Microsoft Form for participants to submit results. Highlight this in the first Newsletter next semester.
                        </p>
                    </div>
                </div>
            </div>
        );

        const ResourcesGuest = () => (
            <div className="space-y-6 fade-in">
                <div className="grid gap-6">
                    <section>
                         <div className="flex items-center gap-3 mb-4">
                            <div className="p-2 bg-cyan-100 rounded-lg text-cyan-700"><IconFolder /></div>
                            <h2 className="text-2xl font-bold text-slate-800">7. Resource Repository</h2>
                        </div>
                        <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                            <h3 className="font-bold text-slate-800 mb-2">Shared Google Doc</h3>
                            <p className="text-slate-600 mb-4">
                                Establish a central repository for teaching materials, research links, and sustainability case studies.
                            </p>
                            <div className="p-3 bg-slate-50 rounded border border-slate-100">
                                <p className="text-sm font-semibold text-slate-700">Example Resource:</p>
                                <a href="https://serc.carleton.edu/index.html" target="_blank" className="text-cyan-600 text-sm hover:underline">
                                    Science Education Resource Center (SERC)
                                </a>
                            </div>
                        </div>
                    </section>

                    <section>
                         <div className="flex items-center gap-3 mb-4">
                            <div className="p-2 bg-pink-100 rounded-lg text-pink-700"><IconUserPlus /></div>
                            <h2 className="text-2xl font-bold text-slate-800">8. Guest Engagement</h2>
                        </div>
                        <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                            <p className="text-slate-600">
                                Plan to invite <strong>Jim Simon</strong> to a future session to share insights and campus-level sustainability perspectives.
                            </p>
                        </div>
                    </section>
                </div>
            </div>
        );

        const App = () => {
            const [activeSection, setActiveSection] = useState('overview');
            const [mobileMenuOpen, setMobileMenuOpen] = useState(false);

            const navItems = [
                { id: 'overview', label: 'Overview', icon: IconUsers },
                { id: 'building', label: '1. Building & Ops', icon: IconBuilding },
                { id: 'food', label: '2. Food Practices', icon: IconFood },
                { id: 'comms', label: '3. Communication', icon: IconNews },
                { id: 'uni', label: '4. University Updates', icon: IconUni },
                { id: 'carbon', label: '5. Carbon Footprint', icon: IconFootprint },
                { id: 'resources', label: '7-8. Resources & Guests', icon: IconFolder },
            ];

            const renderContent = () => {
                switch(activeSection) {
                    case 'overview': return <Overview />;
                    case 'building': return <BuildingOps />;
                    case 'food': return <FoodPractices />;
                    case 'comms': return <Communication />;
                    case 'uni': return <UniversityUpdates />;
                    case 'carbon': return <CarbonFootprint />;
                    case 'resources': return <ResourcesGuest />;
                    default: return <Overview />;
                }
            };

            return (
                <div className="min-h-screen flex flex-col md:flex-row max-w-6xl mx-auto md:my-8 md:rounded-3xl overflow-hidden shadow-2xl bg-white border border-slate-200">
                    {/* Mobile Header */}
                    <div className="md:hidden bg-white border-b border-slate-100 p-4 flex justify-between items-center sticky top-0 z-20">
                        <div className="font-bold text-slate-800 flex items-center gap-2">
                             <div className="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center text-white"><IconUsers /></div>
                             <span>Dec 4 Memo</span>
                        </div>
                        <button onClick={() => setMobileMenuOpen(!mobileMenuOpen)} className="p-2 text-slate-600">
                            <IconMenu />
                        </button>
                    </div>

                    {/* Sidebar */}
                    <div className={`
                        fixed inset-0 z-10 bg-slate-50 md:static md:w-64 md:bg-slate-50 md:border-r border-slate-200 p-6 flex-shrink-0 transition-transform duration-300 transform
                        ${mobileMenuOpen ? 'translate-x-0' : '-translate-x-full md:translate-x-0'}
                    `}>
                        <div className="hidden md:block mb-8">
                             <div className="flex items-center gap-3 text-indigo-900 font-bold text-xl">
                                <div className="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center text-white shadow-lg shadow-indigo-200">
                                    <IconUsers />
                                </div>
                                Memo
                            </div>
                            <p className="text-xs text-slate-500 mt-2 uppercase tracking-wider font-semibold pl-1">Dec 4, 2025</p>
                        </div>
                        
                        <nav className="space-y-1">
                            {navItems.map((item) => (
                                <button
                                    key={item.id}
                                    onClick={() => {
                                        setActiveSection(item.id);
                                        setMobileMenuOpen(false);
                                    }}
                                    className={`flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium w-full transition-all text-left ${
                                        activeSection === item.id 
                                            ? 'bg-white text-indigo-700 shadow-sm ring-1 ring-indigo-100' 
                                            : 'text-slate-500 hover:bg-white hover:text-slate-800'
                                    }`}
                                >
                                    <item.icon />
                                    {item.label}
                                </button>
                            ))}
                        </nav>
                    </div>

                    {/* Main Content */}
                    <main className="flex-1 bg-slate-50/50 p-6 md:p-10 overflow-y-auto h-[calc(100vh-80px)] md:h-auto">
                        {renderContent()}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
